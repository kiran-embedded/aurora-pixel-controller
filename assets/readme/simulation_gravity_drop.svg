<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <defs>
    <linearGradient id="bar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#AF52DE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF2D55;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 16 VU Segment Bars -->
  <g transform="translate(20, 130) scale(1, -1)">
    <style>
      .segment { opacity: 0.2; }
      .bar-active { fill: url(#vu-gradient); filter: url(#glow); }
    </style>
    
    <!-- Render 16 bars with different animation offsets -->
    <script type="text/ecmascript">
      /* This script won't run in GitHub, so we use pure SVG animations below */
    </script>

    <!-- Example of one bar with gravity peak -->
    <g transform="translate(0, 0)">
       <!-- Bar Fill -->
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)">
         <animate attributeName="height" values="20;100;40;110;30;90;20" dur="2s" repeatCount="indefinite" />
       </rect>
       <!-- Peak Pixel -->
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)">
         <animate attributeName="y" values="30;110;50;120;40;100;30" dur="2s" repeatCount="indefinite" />
       </rect>
    </g>

    <!-- Generating 16 bars using repetitive code for maximum compatibility -->
    <g transform="translate(25, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="40;80;60;100;40" dur="1.7s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="50;90;70;110;50" dur="1.7s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(50, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="60;110;30;90;60" dur="2.3s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="70;120;40;100;70" dur="2.3s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(75, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="30;90;20;100;30" dur="1.9s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="40;100;30;110;40" dur="1.9s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(100, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="50;100;60;120;50" dur="2.1s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="60;110;70;130;60" dur="2.1s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(125, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="80;40;100;60;80" dur="1.8s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="90;50;110;70;90" dur="1.8s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(150, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="100;20;80;40;100" dur="2.5s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="110;30;90;50;110" dur="2.5s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(175, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="20;70;30;90;20" dur="1.6s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="30;80;40;100;30" dur="1.6s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(200, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="10;110;20;80;10" dur="2.2s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="20;120;30;90;20" dur="2.2s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(225, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="90;50;120;20;90" dur="2.01s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="100;60;130;30;100" dur="2.01s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(250, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="40;100;80;30;40" dur="1.95s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="50;110;90;40;50" dur="1.95s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(275, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="110;20;100;60;110" dur="2.4s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="120;30;110;70;120" dur="2.4s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(300, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="30;120;50;90;30" dur="1.85s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="40;135;60;100;40" dur="1.85s" repeatCount="indefinite" /></rect>
    </g>
    <g transform="translate(325, 0)">
       <rect x="0" y="0" width="18" height="0" fill="url(#bar-grad)"><animate attributeName="height" values="70;30;110;50;70" dur="2.1s" repeatCount="indefinite" /></rect>
       <rect x="0" y="0" width="18" height="4" fill="#FFFFFF" filter="url(#glow)"><animate attributeName="y" values="80;40;120;60;80" dur="2.1s" repeatCount="indefinite" /></rect>
    </g>
  </g>

  <!-- Title for the simulation section -->
  <text x="20" y="25" fill="white" font-family="monospace" font-size="12" font-weight="bold" opacity="0.6">SPECTRAL GRAVITY (VU)</text>
</svg>
